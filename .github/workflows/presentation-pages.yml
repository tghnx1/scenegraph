name: Deploy Presentation to GitHub Pages

on:
  push:
    branches:
      - main
      - Maksim_parcing
    paths:
      - docs/**
      - documentation/transcendence_scene_graph_development_presentation.html
      - .github/workflows/presentation-pages.yml
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync presentation into Pages entrypoint
        run: cp documentation/transcendence_scene_graph_development_presentation.html docs/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
