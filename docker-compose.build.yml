services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scenegraph-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  prisma:
    build:
      context: ./backend
      dockerfile: prisma/Dockerfile
    container_name: scenegraph-prisma
    profiles:
      - tools
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: scenegraph-backend
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3000", "--reload"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.build
    container_name: scenegraph-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: scenegraph_postgres_data
