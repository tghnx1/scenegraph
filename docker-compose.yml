services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  prisma:
    build:
      context: ./backend
      dockerfile: prisma/Dockerfile
    profiles:
      - tools
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3000", "--reload"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests

  tools:
    build:
      context: .
      dockerfile: tools/Dockerfile
    profiles:
      - tools
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app

  recommendation-worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["python", "-m", "app.recommendations.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL}
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80" #from 80:80
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
    name: scenegraph_postgres_data
  frontend_node_modules:
    name: scenegraph_frontend_node_modules
